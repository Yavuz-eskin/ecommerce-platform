spring:
  application:
    name: ecommerce-platform
    
  datasource:
    url: jdbc:postgresql://localhost:5432/ecommerce_db
    username: myuser
    password: mypassword
    driver-class-name: org.postgresql.Driver
    
  jpa:
    hibernate:
      ddl-auto: update # Geliştirme aşaması için tabloları otomatik günceller
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

